<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo — Ondas do Conhecimento</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1B5E20 0%, #121212 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header img {
      width: 64px;
      margin-bottom: 1rem;
    }

    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }

    .login-header p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #4CAF50;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2);
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: #45a049;
      transform: translateY(-2px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.875rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }

    .back-to-site {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .back-to-site:hover {
      color: white;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="assets/img/logo-projeto.png" alt="Ondas do Conhecimento">
      <h1>Área de Membros</h1>
      <p>Acesso restrito para administradores</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="admin@exemplo.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login" id="btn-entrar">Entrar no Painel</button>
      <div id="error-msg" class="error-msg">Usuário ou senha inválidos.</div>
    </form>

    <a href="/" class="back-to-site">← Voltar para o site</a>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btnEntrar = document.getElementById('btn-entrar');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btnEntrar.innerText = 'Autenticando...';
      btnEntrar.disabled = true;

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // Redirecionamento baseado no papel (role)
          if (data.user.role === 'admin') {
            window.location.href = '/dashboard.html';
          } else {
            window.location.href = '/portal.html';
          }
        } else {
          errorMsg.style.display = 'block';
          btnEntrar.innerText = 'Entrar no Painel';
          btnEntrar.disabled = false;
        }
      } catch (err) {
        console.error('Erro no login:', err);
        errorMsg.innerText = 'Erro de conexão com o servidor.';
        errorMsg.style.display = 'block';
        btnEntrar.innerText = 'Entrar no Painel';
        btnEntrar.disabled = false;
      }
    });
  </script>
</body>
</html>

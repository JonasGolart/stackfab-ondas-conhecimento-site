<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha — Ondas do Conhecimento</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f0e6d2 0%, #faf6ee 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #2e2720;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(46, 39, 32, 0.08);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(46, 39, 32, 0.1);
      transition: all 0.3s ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header img {
      width: 64px;
      margin-bottom: 1rem;
    }

    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }

    .login-header p {
      color: #7d7060;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #7d7060;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #ffffff;
      border: 1px solid rgba(46, 39, 32, 0.15);
      border-radius: 12px;
      color: #2e2720;
      font-size: 1rem;
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #2e7d32;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.15);
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: #1b5e20;
      transform: translateY(-2px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.875rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
      background: rgba(220, 38, 38, 0.05);
      border: 1px solid rgba(220, 38, 38, 0.15);
      padding: 0.75rem;
      border-radius: 12px;
    }

    .success-msg {
      color: #2e7d32;
      font-size: 0.875rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
      background: rgba(46, 125, 50, 0.05);
      border: 1px solid rgba(46, 125, 50, 0.15);
      padding: 0.75rem;
      border-radius: 12px;
      line-height: 1.4;
    }

    .back-to-site {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: #7d7060;
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .back-to-site:hover {
      color: #2e2720;
    }
  </style>
</head>
<body>
  <div class="login-container">
    
    <div id="reset-view">
      <div class="login-header">
        <img src="assets/img/logo-projeto.png" alt="Ondas do Conhecimento">
        <h1>Nova Senha</h1>
        <p>Defina sua nova senha de acesso administrativo</p>
      </div>

      <!-- Alerta inicial se o token estiver ausente -->
      <div id="token-error-msg" class="error-msg" style="display: none; margin-bottom: 1.5rem;">Token de redefinição de senha inválido ou ausente da URL.</div>

      <form id="reset-form">
        <div class="form-group">
          <label for="new-password" class="form-label">Nova Senha</label>
          <input type="password" id="new-password" class="form-input" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="form-group">
          <label for="confirm-password" class="form-label">Confirmar Nova Senha</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="Digite a senha novamente" required>
        </div>

        <button type="submit" class="btn-login" id="btn-redefinir">Salvar Nova Senha</button>
        <div id="success-msg" class="success-msg">Senha atualizada com sucesso! Redirecionando para a tela de login...</div>
        <div id="error-msg" class="error-msg"></div>
      </form>

      <a href="login.html" class="back-to-site">← Voltar para o login</a>
    </div>

  </div>

  <script>
    const resetForm = document.getElementById('reset-form');
    const successMsg = document.getElementById('success-msg');
    const errorMsg = document.getElementById('error-msg');
    const tokenErrorMsg = document.getElementById('token-error-msg');
    const btnRedefinir = document.getElementById('btn-redefinir');

    // Extrair token da URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Bloquear formulário se não houver token
    if (!token) {
      tokenErrorMsg.style.display = 'block';
      resetForm.style.pointerEvents = 'none';
      resetForm.style.opacity = '0.5';
      btnRedefinir.disabled = true;
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      const password = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      // Validação rápida
      if (password.length < 6) {
        errorMsg.innerText = 'A nova senha deve conter pelo menos 6 caracteres.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.innerText = 'As senhas digitadas não coincidem. Verifique e tente novamente.';
        errorMsg.style.display = 'block';
        return;
      }

      btnRedefinir.innerText = 'Salvando...';
      btnRedefinir.disabled = true;

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.style.display = 'block';
          resetForm.reset();
          // Redirecionamento suave após 3 segundos
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        } else {
          errorMsg.innerText = data.error || 'Erro ao redefinir a senha.';
          errorMsg.style.display = 'block';
          btnRedefinir.innerText = 'Salvar Nova Senha';
          btnRedefinir.disabled = false;
        }
      } catch (err) {
        console.error('Erro na redefinição:', err);
        errorMsg.innerText = 'Erro de conexão com o servidor.';
        errorMsg.style.display = 'block';
        btnRedefinir.innerText = 'Salvar Nova Senha';
        btnRedefinir.disabled = false;
      }
    });
  </script>
</body>
</html>

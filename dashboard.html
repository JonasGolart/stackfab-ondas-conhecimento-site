<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Ondas do Conhecimento</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4CAF50;
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .sidebar-header img {
      width: 40px;
    }

    .sidebar-nav {
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 0.5rem;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(76, 175, 80, 0.1);
      color: var(--primary);
    }

    .logout-btn {
      margin-top: auto;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: none;
      padding: 0.75rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 600;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 2rem 3rem;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      margin: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: 20px;
    }

    .stat-card span {
      display: block;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .stat-card h2 {
      font-size: 2rem;
      margin: 0;
      color: var(--primary);
    }

    /* Table */
    .table-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.875rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
    }

    td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge--success { background: rgba(34, 197, 94, 0.1); color: #22c55e; }

    #loading {
      text-align: center;
      padding: 3rem;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="assets/img/logo-projeto.png" alt="Logo">
        <span style="font-weight: 700;">Ondas Admin</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          Inscrições
        </a>
      </nav>

      <button onclick="logout()" class="logout-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair
      </button>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Inscrições Recebidas</h1>
        <div id="user-info" style="font-size: 0.875rem; color: rgba(255, 255, 255, 0.6);"></div>
      </header>

      <div class="stats">
        <div class="stat-card">
          <span>Total de Inscritos</span>
          <h2 id="total-count">0</h2>
        </div>
        <div class="stat-card">
          <span>Total de Participantes</span>
          <h2 id="total-participants">0</h2>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Grupo / Instituição</th>
              <th>Responsável</th>
              <th>E-mail</th>
              <th>Participantes</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="inscriptions-list">
            <!-- Data will be injected here -->
          </tbody>
        </table>
        <div id="loading">Carregando dados...</div>
      </div>
    </main>
  </div>

  <script>
    // Security check
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) {
      window.location.href = '/login.html';
    }

    document.getElementById('user-info').innerText = `Bem-vindo, ${user.name || 'Admin'}`;

    async function loadInscriptions() {
      try {
        const response = await fetch('/api/inscriptions', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.status === 401 || response.status === 403) {
          logout();
          return;
        }

        const inscriptions = await response.json();
        const list = document.getElementById('inscriptions-list');
        const loading = document.getElementById('loading');
        
        loading.style.display = 'none';
        list.innerHTML = '';

        let totalParticipants = 0;

        inscriptions.forEach(ins => {
          totalParticipants += parseInt(ins.participantes || 0);
          const row = document.createElement('tr');
          row.innerHTML = `
            <td><strong>${ins.grupo}</strong></td>
            <td>${ins.responsavel}</td>
            <td>${ins.email}</td>
            <td><span class="badge badge--success">${ins.participantes}</span></td>
            <td>${new Date(ins.created_at).toLocaleDateString('pt-BR')}</td>
          `;
          list.appendChild(row);
        });

        document.getElementById('total-count').innerText = inscriptions.length;
        document.getElementById('total-participants').innerText = totalParticipants;

      } catch (err) {
        console.error('Erro ao carregar inscrições:', err);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    loadInscriptions();
  </script>
</body>
</html>

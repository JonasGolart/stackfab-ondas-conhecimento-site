<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Participante — Ondas do Conhecimento</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2e7d32;
      --primary-dark: #1b5e20;
      --bg: #faf6ee;
      --card: rgba(255, 255, 255, 0.9);
      --text: #2e2720;
      --text-muted: #7d7060;
      --border: rgba(46, 39, 32, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(240, 230, 210, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 0.65rem; font-weight: 800; font-size: 1.2rem; }
    .logo img { width: 32px; }

    .user-profile { display: flex; align-items: center; gap: 0.9rem; }
    .logout-link { color: #dc2626; text-decoration: none; font-size: 0.9rem; font-weight: 600; }

    .app-shell {
      width: min(1400px, 100%);
      margin: 1.25rem auto;
      padding: 0 1rem 1rem;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 1rem;
      flex: 1;
    }

    .sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      min-height: calc(100vh - 120px);
      max-height: calc(100vh - 120px);
      position: sticky;
      top: 76px;
    }

    .sidebar-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 700;
      padding: 0.2rem 0.35rem;
    }

    .action-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 0.72rem 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }

    .action-btn:hover { border-color: rgba(46, 125, 50, 0.35); }
    .action-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 8px 20px rgba(46, 125, 50, 0.22);
    }

    .materials-menu {
      border-top: 1px solid var(--border);
      margin-top: 0.25rem;
      padding-top: 0.75rem;
      display: none;
      flex-direction: column;
      min-height: 0;
      gap: 0.75rem;
      flex: 1;
    }

    .materials-menu.visible { display: flex; }

    .category-filter {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 0.62rem 0.75rem;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
    }

    .materials-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
      padding-right: 0.2rem;
    }

    .material-item {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 10px;
      padding: 0.62rem 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .material-item:hover { border-color: rgba(46, 125, 50, 0.35); transform: translateX(2px); }
    .material-item.active { border-color: var(--primary); background: rgba(46, 125, 50, 0.08); }

    .material-item small {
      display: block;
      color: var(--text-muted);
      font-size: 0.72rem;
      margin-top: 0.25rem;
    }

    .center-stage {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .center-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .center-title { font-size: 1.1rem; font-weight: 800; }
    .center-subtitle { color: var(--text-muted); font-size: 0.85rem; }

    .download-btn {
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      font-size: 0.85rem;
    }

    .view-body { flex: 1; min-height: 0; }

    .view {
      width: 100%;
      height: 100%;
      display: none;
    }

    .view.active { display: block; }

    .welcome-view {
      padding: 2rem;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-muted);
    }

    .welcome-card {
      max-width: 560px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.8);
    }

    .welcome-card h2 { color: var(--text); margin-bottom: 0.5rem; }

    .pdf-frame, .simulado-frame {
      border: none;
      width: 100%;
      height: 100%;
      min-height: 540px;
      background: #fff;
    }

    @media (max-width: 1020px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        max-height: none;
        position: static;
      }

      .center-stage {
        min-height: 74vh;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="assets/img/logo-projeto.png" alt="Logo">
      <span>Ondas do Conhecimento</span>
    </div>
    <div class="user-profile">
      <span id="user-name" style="font-weight: 600;">Participante</span>
      <a href="#" onclick="logout()" class="logout-link">Sair</a>
    </div>
  </nav>

  <main class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-title">Ações do Portal</div>
      <button id="action-materials" class="action-btn active">Materiais</button>
      <button id="action-simulados" class="action-btn">Simulados</button>

      <div id="materials-menu" class="materials-menu visible">
        <select id="sidebar-category-filter" class="category-filter"></select>
        <div id="sidebar-materials-list" class="materials-list">
          <div style="color:var(--text-muted);font-size:0.85rem;padding:0.35rem;">Carregando materiais...</div>
        </div>
      </div>
    </aside>

    <section class="center-stage">
      <div class="center-header">
        <div>
          <div id="center-title" class="center-title">Materiais de Estudo</div>
          <div id="center-subtitle" class="center-subtitle">Selecione um módulo na barra lateral para abrir no centro.</div>
        </div>
        <a id="download-pdf-btn" class="download-btn" href="#" target="_blank" style="display:none;">Baixar PDF</a>
      </div>

      <div class="view-body">
        <div id="view-welcome" class="view active">
          <div class="welcome-view">
            <div class="welcome-card">
              <h2>Olá, <span id="welcome-name">Participante</span>!</h2>
              <p>Use a sidebar para abrir materiais ou iniciar simulados sem sair desta página.</p>
            </div>
          </div>
        </div>

        <div id="view-pdf" class="view">
          <iframe id="pdf-frame" class="pdf-frame" title="Visualizador de PDF"></iframe>
        </div>

        <div id="view-simulado" class="view">
          <iframe id="simulado-frame" class="simulado-frame" title="Simulado" src=""></iframe>
        </div>
      </div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const normalizedRole = String(user.role || '').trim().toLowerCase();

    if (!token || normalizedRole !== 'participant') {
      window.location.href = 'login.html';
    }

    document.getElementById('user-name').innerText = user.name || 'Participante';
    document.getElementById('welcome-name').innerText = (user.name || 'Participante').split(' ')[0];

    const actionMaterialsBtn = document.getElementById('action-materials');
    const actionSimuladosBtn = document.getElementById('action-simulados');
    const materialsMenu = document.getElementById('materials-menu');
    const categoryFilter = document.getElementById('sidebar-category-filter');
    const materialsListEl = document.getElementById('sidebar-materials-list');

    const centerTitle = document.getElementById('center-title');
    const centerSubtitle = document.getElementById('center-subtitle');
    const downloadBtn = document.getElementById('download-pdf-btn');

    const viewWelcome = document.getElementById('view-welcome');
    const viewPdf = document.getElementById('view-pdf');
    const viewSimulado = document.getElementById('view-simulado');

    const pdfFrame = document.getElementById('pdf-frame');
    const simuladoFrame = document.getElementById('simulado-frame');

    let allMaterials = [];
    let selectedCategory = 'all';
    let selectedMaterialId = null;

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function setActiveView(view) {
      [viewWelcome, viewPdf, viewSimulado].forEach(v => v.classList.remove('active'));
      if (view === 'pdf') viewPdf.classList.add('active');
      else if (view === 'simulado') viewSimulado.classList.add('active');
      else viewWelcome.classList.add('active');
    }

    function setAction(action) {
      const isMaterials = action === 'materials';
      actionMaterialsBtn.classList.toggle('active', isMaterials);
      actionSimuladosBtn.classList.toggle('active', !isMaterials);
      materialsMenu.classList.toggle('visible', isMaterials);

      if (isMaterials) {
        if (selectedMaterialId) {
          openMaterial(selectedMaterialId);
        } else {
          centerTitle.innerText = 'Materiais de Estudo';
          centerSubtitle.innerText = 'Selecione um módulo na barra lateral para abrir no centro.';
          downloadBtn.style.display = 'none';
          setActiveView('welcome');
        }
      } else {
        centerTitle.innerText = 'Simulados';
        centerSubtitle.innerText = 'O simulado foi aberto no centro do portal.';
        downloadBtn.style.display = 'none';
        if (!simuladoFrame.src) {
          simuladoFrame.src = 'simulado.html';
        }
        setActiveView('simulado');
      }
    }

    function getFilteredMaterials() {
      if (selectedCategory === 'all') return allMaterials;
      return allMaterials.filter(m => String(m.category).toLowerCase() === String(selectedCategory).toLowerCase());
    }

    function renderCategoryFilter() {
      const categories = [...new Set(allMaterials.map(m => m.category).filter(Boolean))];
      categoryFilter.innerHTML = '<option value="all">Todos os módulos</option>' +
        categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
      categoryFilter.value = selectedCategory;
    }

    function renderMaterialsSidebar() {
      const filtered = getFilteredMaterials();

      if (filtered.length === 0) {
        materialsListEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;padding:0.35rem;">Nenhum material nesta categoria.</div>';
        return;
      }

      materialsListEl.innerHTML = filtered.map(m => {
        const activeClass = m.id === selectedMaterialId ? 'active' : '';
        return `
          <button class="material-item ${activeClass}" onclick="openMaterial(${m.id})">
            <strong>${m.title}</strong>
            <small>${m.category || 'Sem categoria'}</small>
          </button>`;
      }).join('');
    }

    async function loadMaterials() {
      try {
        const response = await fetch('/api/materials');
        allMaterials = await response.json();
        renderCategoryFilter();
        renderMaterialsSidebar();
      } catch (err) {
        console.error('Erro ao carregar materiais:', err);
        materialsListEl.innerHTML = '<div style="color:#dc2626;font-size:0.85rem;padding:0.35rem;">Falha ao carregar materiais.</div>';
      }
    }

    function openMaterial(materialId) {
      const material = allMaterials.find(m => m.id === materialId);
      if (!material) return;

      selectedMaterialId = materialId;
      renderMaterialsSidebar();

      actionMaterialsBtn.classList.add('active');
      actionSimuladosBtn.classList.remove('active');
      materialsMenu.classList.add('visible');

      centerTitle.innerText = material.title;
      centerSubtitle.innerText = material.description || (material.category ? `Categoria: ${material.category}` : 'Visualização do material selecionado');
      downloadBtn.href = material.file_path;
      downloadBtn.style.display = 'inline-block';

      pdfFrame.src = material.file_path;
      setActiveView('pdf');
    }

    categoryFilter.addEventListener('change', (e) => {
      selectedCategory = e.target.value;
      selectedMaterialId = null;
      renderMaterialsSidebar();
      centerTitle.innerText = 'Materiais de Estudo';
      centerSubtitle.innerText = 'Selecione um módulo na barra lateral para abrir no centro.';
      downloadBtn.style.display = 'none';
      setActiveView('welcome');
    });

    actionMaterialsBtn.addEventListener('click', () => setAction('materials'));
    actionSimuladosBtn.addEventListener('click', () => setAction('simulados'));

    window.openMaterial = openMaterial;

    loadMaterials();
    setAction('materials');
  </script>
</body>
</html>
